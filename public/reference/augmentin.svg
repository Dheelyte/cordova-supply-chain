<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf3ea"/>
      <stop offset="100%" stop-color="#d6e4d2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="10" fill="url(#abg)"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="40" fill="#2a6a40"/>
  <text x="20" y="26" font-family="Inter, system-ui" font-size="18" font-weight="700" fill="#fff">Augmentin</text>
  <text x="380" y="26" text-anchor="end" font-family="Inter, system-ui" font-size="11" font-weight="500" fill="#fff" opacity="0.85">amoxicillin / clavulanate</text>
  <!-- Strength -->
  <rect x="20" y="60" width="80" height="34" rx="4" fill="#2a6a40"/>
  <text x="60" y="83" text-anchor="middle" font-family="Inter, system-ui" font-size="14" font-weight="700" fill="#fff">625 mg</text>
  <rect x="106" y="60" width="80" height="34" rx="4" fill="none" stroke="#2a6a40" stroke-width="1.5"/>
  <text x="146" y="83" text-anchor="middle" font-family="Inter, system-ui" font-size="11" font-weight="600" fill="#2a6a40">14 tablets</text>
  <!-- Capsule illustration -->
  <g transform="translate(220, 100)">
    <rect x="0" y="10" width="140" height="22" rx="11" fill="#fff" stroke="#9ab69a"/>
    <rect x="0" y="10" width="70" height="22" rx="11" fill="#2a6a40"/>
    <rect x="0" y="40" width="140" height="22" rx="11" fill="#fff" stroke="#9ab69a"/>
    <rect x="0" y="40" width="70" height="22" rx="11" fill="#2a6a40"/>
  </g>
  <!-- Tagline -->
  <text x="20" y="118" font-family="Inter, system-ui" font-size="11" fill="#33502f">Broad-spectrum oral antibiotic</text>
  <!-- Batch/expiry -->
  <rect x="20" y="220" width="170" height="44" rx="4" fill="#fff" stroke="#9ab69a"/>
  <text x="28" y="236" font-family="JetBrains Mono, monospace" font-size="9" fill="#576e57">BATCH</text>
  <text x="28" y="250" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#1d3a23">MB-AUG-2026-002</text>
  <text x="120" y="236" font-family="JetBrains Mono, monospace" font-size="9" fill="#576e57">EXP</text>
  <text x="120" y="250" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#1d3a23">02 / 2028</text>
  <!-- NAFDAC -->
  <rect x="210" y="220" width="170" height="44" rx="4" fill="#2a6a40"/>
  <text x="220" y="237" font-family="Inter, system-ui" font-size="10" font-weight="600" fill="#fff">NAFDAC REG</text>
  <text x="220" y="255" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#fff">04-2918</text>
</svg>
